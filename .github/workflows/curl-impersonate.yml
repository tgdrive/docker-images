name: curl-impersonate

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if version exists'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 0 * * 1'

jobs:
  build:
    uses: ./.github/workflows/_docker-build.yml
    with:
      image-name: tgdrive/curl-impersonate
      build-context: ./curl-impersonate
      upstream-repo: lexiforest/curl-impersonate
      force: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
    secrets: inherit
