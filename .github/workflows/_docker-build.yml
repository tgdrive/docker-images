name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      build-context:
        required: true
        type: string
      upstream-repo:
        required: true
        type: string
      version-filter:
        required: false
        type: string
        default: '.tag_name'
      provenance:
        required: false
        type: boolean
        default: false
      sbom:
        required: false
        type: boolean
        default: false
      force:
        required: false
        type: boolean
        default: false
      upstream-source-repo:
        required: false
        type: string
        default: ''
      canonical-dockerfile:
        required: false
        type: string
        default: ''

permissions:
  packages: write
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.version.outputs.build }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check upstream version
        id: version
        run: |
          set -euo pipefail

          VERSION=$(curl -fsSL \
            "https://api.github.com/repos/${{ inputs.upstream-repo }}/releases/latest" \
            | jq -r '${{ inputs.version-filter }}')

          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "Failed to resolve ${{ inputs.upstream-repo }} latest release"
            exit 1
          fi

          if docker manifest inspect "ghcr.io/${{ inputs.image-name }}:${VERSION}" >/dev/null 2>&1; then
            EXISTS=true
          else
            EXISTS=false
          fi

          if [ "$EXISTS" = "false" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists, skipping build"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build_per_arch:
    name: Build for ${{ matrix.platform }}
    needs: check-version
    if: needs.check-version.outputs.build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout upstream source
        if: inputs.upstream-source-repo != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.upstream-source-repo }}
          ref: ${{ needs.check-version.outputs.version }}
          path: upstream-source

      - name: Replace Dockerfile with canonical version
        if: inputs.canonical-dockerfile != ''
        run: cp ${{ inputs.canonical-dockerfile }} upstream-source/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build context
        id: ctx
        run: |
          if [ -n "${{ inputs.upstream-source-repo }}" ]; then
            echo "path=upstream-source" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ inputs.build-context }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Architecture-Specific Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.ctx.outputs.path }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}
          tags: ghcr.io/${{ inputs.image-name }}:${{ needs.check-version.outputs.version }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=${{ inputs.image-name }}
            org.opencontainers.image.version=${{ needs.check-version.outputs.version }}

  create_manifest:
    name: Create and Push Docker Manifest
    runs-on: ubuntu-latest
    needs: [check-version, build_per_arch]
    if: needs.check-version.outputs.build == 'true'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Manifest List
        env:
          REPO: ghcr.io/${{ inputs.image-name }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          IMG_AMD64="${REPO}:${VERSION}-amd64"
          IMG_ARM64="${REPO}:${VERSION}-arm64"

          echo "Creating manifest for ${REPO}:${VERSION}"
          docker buildx imagetools create \
            -t "${REPO}:${VERSION}" \
            "${IMG_AMD64}" \
            "${IMG_ARM64}"

          echo "Creating manifest for ${REPO}:latest"
          docker buildx imagetools create \
            -t "${REPO}:latest" \
            "${IMG_AMD64}" \
            "${IMG_ARM64}"
